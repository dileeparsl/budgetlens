name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Skip if frontend not scaffolded
        id: fe
        run: |
          if [ -f frontend/package.json ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.fe.outputs.ok == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.fe.outputs.ok == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint
        if: steps.fe.outputs.ok == 'true'
        working-directory: frontend
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.fe.outputs.ok == 'true'
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        if: steps.fe.outputs.ok == 'true'
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend smoke (compile)
        working-directory: backend
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            python -m compileall app 2>/dev/null || python -m compileall . || true
          elif [ -f pyproject.toml ]; then
            pip install . 2>/dev/null || pip install fastapi pydantic uvicorn 2>/dev/null || true
            python -m compileall app 2>/dev/null || true
          else
            echo "backend/ not scaffolded yet — skipping Python checks"
          fi
